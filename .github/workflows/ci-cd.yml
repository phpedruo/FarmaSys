name: CI/CD — FarmaSys

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # 1. CI — Testes automáticos (unitários + Selenium headless)
  # ─────────────────────────────────────────
  test:
    name: Testes Django
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///db.sqlite3
      SECRET_KEY: ci-secret-key-nao-usar-em-producao
      DEBUG: "True"
      DJANGO_TEST_SELENIUM_HEADLESS: "true"

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar Google Chrome (para testes Selenium)
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependências Python (incluindo selenium)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Aplicar migrações
        run: python manage.py migrate

      - name: Rodar testes Django
        run: python manage.py test --verbosity=2

  # ─────────────────────────────────────────
  # 2. CD — Deploy no Render (só no push para main)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy no Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.RENDER_DEPLOY_HOOK_URL != ''

    steps:
      - name: Acionar deploy no Render
        run: curl --fail-with-body -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Deploy acionado com sucesso
        run: echo "Deploy enviado ao Render. Aguarde ~1min para a aplicação atualizar."